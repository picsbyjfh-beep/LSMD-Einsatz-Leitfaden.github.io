<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSMD | Ultimate Medical Knowledge Base</title>
    <style>
        :root {
            --lsmd-red: #c0392b; --surgery-blue: #2980b9; --psych-purple: #8e44ad;
            --dark-bg: #0a0a0a; --card-bg: #161616; --text: #f0f0f0;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark-bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        
        /* Header & Search */
        .header { text-align: center; border-bottom: 2px solid var(--lsmd-red); padding-bottom: 20px; margin-bottom: 10px; }
        .search-container { position: sticky; top: 0; background: var(--dark-bg); padding: 15px 0; z-index: 100; border-bottom: 1px solid #333; }
        .search-box { width: 100%; padding: 15px; background: #222; border: 1px solid #444; border-radius: 8px; color: white; font-size: 18px; outline: none; }
        .search-box:focus { border-color: var(--lsmd-red); box-shadow: 0 0 10px var(--lsmd-red); }

        .filter-group { display: flex; gap: 10px; margin-top: 15px; justify-content: center; flex-wrap: wrap; }
        .filter-btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; background: #333; color: #ccc; transition: 0.3s; font-weight: bold; text-transform: uppercase; font-size: 0.85em; }
        .filter-btn.active { background: var(--lsmd-red); color: white; }

        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 25px; margin-top: 20px; }
        .card { background: var(--card-bg); border-radius: 12px; border: 1px solid #222; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { border-color: #555; transform: translateY(-5px); }
        
        .card-header { padding: 15px 20px; font-weight: bold; font-size: 1.1em; border-bottom: 4px solid transparent; display: flex; justify-content: space-between; align-items: center; }
        .EMERGENCY .card-header { border-color: var(--lsmd-red); color: #ff7675; background: #2a1010; }
        .SURGERY .card-header { border-color: var(--surgery-blue); color: #74b9ff; background: #101a2a; }
        .PSYCH .card-header { border-color: var(--psych-purple); color: #a29bfe; background: #1a102a; }

        .card-content { padding: 20px; flex-grow: 1; }
        .label { color: #888; font-size: 0.75em; text-transform: uppercase; display: block; margin-top: 15px; border-bottom: 1px solid #333; padding-bottom: 3px; margin-bottom: 8px; font-weight: bold; }
        
        .rp-box { background: #000; color: #00b894; padding: 12px; border-radius: 6px; font-family: 'Courier New', monospace; margin-top: 10px; border-left: 4px solid #00b894; font-size: 0.9em; line-height: 1.5; }
        .med-tag { color: #fdcb6e; font-weight: bold; font-size: 0.95em; display: inline-block; background: #2d2412; padding: 2px 8px; border-radius: 4px; }
        
        ul { padding-left: 20px; margin: 0; }
        li { margin-bottom: 6px; font-size: 0.95em; }
        .warn-box { background: #351414; color: #ff7675; padding: 10px; border-radius: 6px; font-size: 0.85em; margin-top: 15px; border: 1px solid #ff767533; }

        @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>LSMD | GLOBAL MEDICAL ENCYCLOPEDIA</h1>
        <p>Vollständiges Kompendium für alle Fachbereiche & Szenarien</p>
    </div>

    <div class="search-container">
        <input type="text" id="search" class="search-box" placeholder="Suchen nach Verletzung, ID, Symptom, Medikament (z.B. Schuss, Psychose, Bruch)..." onkeyup="render()">
        <div class="filter-group">
            <button class="filter-btn active" onclick="setFilter('ALL', this)">Alle Fälle</button>
            <button class="filter-btn" onclick="setFilter('EMERGENCY', this)">Notaufnahme</button>
            <button class="filter-btn" onclick="setFilter('SURGERY', this)">Chirurgie (OP)</button>
            <button class="filter-btn" onclick="setFilter('PSYCH', this)">Psychotherapie</button>
        </div>
    </div>

    <div id="grid" class="grid"></div>
</div>

        { id: 209, type: "SURGERY", title: "Hüft-TEP (Vollprothese)", tags: "hüfte gelenk bruch knochen op alt", steps: ["Hüftkopf-Resektion (Absägen)", "Auffräsen der Gelenkpfanne", "Einsetzen des Metallschafts", "Einrenken des neuen Gelenks"], meds: "Narkose, Heparin", rp: "/me fräst die Pfanne im Beckenknochen aus\n/me hämmert den Prothesenschaft in den Femur", note: "Postoperative Mobilisierung am ersten Tag!" },

        { id: 310, type: "PSYCH", title: "Dissoziative Identitätsstörung", tags: "persönlichkeit spaltung trauma multiple ego", steps: ["Sicherheitsaufbau im System", "Kommunikation zwischen Anteilen", "Traumabearbeitung (langfristig)", "Alltagsbewältigungshilfen"], meds: "Keine spezifischen Medikamente", rp: "/me fragt vorsichtig nach dem Namen des aktuellen Anteils\n/me macht sich Notizen zum Stimmenwechsel", note: "Geduld und absolute Verlässlichkeit sind essenziell!" }
    ];

    let filterType = 'ALL';

    function setFilter(type, btn) {
        filterType = type;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function render() {
        const query = document.getElementById('search').value.toLowerCase();
        const grid = document.getElementById('grid');
        grid.innerHTML = "";

        database.forEach(item => {
            const matchSearch = item.title.toLowerCase().includes(query) || 
                               item.tags.toLowerCase().includes(query) || 
                               item.id.toString().includes(query);
            const matchFilter = filterType === 'ALL' || item.type === filterType;

            if (matchSearch && matchFilter) {
                grid.innerHTML += `
                    <div class="card ${item.type}">
                        <div class="card-header">
                            <span>§${item.id} | ${item.title}</span>
                        </div>
                        <div class="card-content">
                            <span class="label">Behandlungsablauf</span>
                            <ul>${item.steps.map(s => `<li>${s}</li>`).join('')}</ul>
                            
                            <span class="label">Medikation & Stoffklasse</span>
                            <span class="med-tag">${item.meds}</span>
                            
                            <span class="label">RP-Guide (/me /do)</span>
                            <div class="rp-box">${item.rp.replace(/\n/g, '<br>')}</div>
                            
                            <div class="warn-box">
                                <strong>⚠️ WICHTIGER HINWEIS:</strong><br>
                                ${item.note}
                            </div>
                        </div>
                    </div>`;
            }
        });
    }

    // Erster Start
    render();
</script>

</body>
</html>
