<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSMD | Fachbereichs-Leitfaden</title>
    <style>
        :root { --lsmd-red: #c0392b; --dark-bg: #121212; --card-bg: #1e1e1e; --text: #e0e0e0; --surgery-blue: #2980b9; --therapy-purple: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: var(--text); padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        h1 { color: var(--lsmd-red); text-align: center; text-transform: uppercase; }
        .search-box { width: 100%; padding: 15px; background: #252525; border: 1px solid var(--lsmd-red); border-radius: 8px; color: white; margin-bottom: 20px; box-sizing: border-box; }
        
        .guide-card { background: var(--card-bg); border-radius: 8px; margin-bottom: 15px; border-left: 5px solid #444; display: none; }
        .surgery { border-left-color: var(--surgery-blue); }
        .therapy { border-left-color: var(--therapy-purple); }
        
        .card-header { background: #252525; padding: 15px 20px; font-weight: bold; display: flex; justify-content: space-between; }
        .card-body { padding: 20px; line-height: 1.6; }
        
        .dosage-info { background: #121212; padding: 10px; border-radius: 5px; border: 1px solid #333; margin-top: 15px; font-size: 0.9em; }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; margin-right: 5px; text-transform: uppercase; }
        .badge-med { background: #2c3e50; color: #3498db; }
        .badge-dept { background: #333; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>LSMD Medical Dashboard</h1>
    <input type="text" id="search" class="search-box" placeholder="Suchen nach: Chirurgie, Psychose, Medikament, Skalpell..." onkeyup="search()">

    <div id="guide"></div>
</div>

<script>
    const data = [
        // --- CHIRURGIE ---
        {
            title: "Operative Kugelentfernung (Torax)",
            dept: "Chirurgie",
            type: "surgery",
            keywords: "chirurgie kugel op narkose skalpell",
            steps: [
                "Einleitung der Vollnarkose nach Narkoseprotokoll",
                "Großflächige Desinfektion des OP-Feldes",
                "Inzision mit Skalpell",
                "Blutstillung mittels Kauterisation",
                "Extraktion des Projektils",
                "Wundverschluss (Naht)"
            ],
            meds: "Antibiotikaprophylaxe, Postoperative Schmerztherapie",
            dosage: "Schmerzmanagement nach ärztlicher Anordnung."
        },
        // --- PSYCHOTHERAPIE ---
        {
            title: "Akute Psychotische Episode",
            dept: "Psychotherapie",
            type: "therapy",
            keywords: "psychose therapie wahn stimmen angst",
            steps: [
                "Deeskalierendes Gespräch (ruhige Umgebung)",
                "Realitätsprüfung (vorsichtiges Hinterfragen der Wahninhalte)",
                "Medikamentöse Akutintervention",
                "Gefährdungsbeurteilung (Eigen- / Fremdgefährdung)",
                "Einleitung einer stationären Langzeittherapie"
            ],
            meds: "Antipsychotika (z.B. Olanzapin oder Risperidon)",
            dosage: "Medikamentöse Einstellung erfolgt individuell durch den Psychiater."
        },
        {
            title: "Generalisierte Angststörung",
            dept: "Psychotherapie",
            type: "therapy",
            keywords: "angst panik therapie depression",
            steps: [
                "Anamneseerhebung (Trigger-Identifikation)",
                "Kognitive Umstrukturierung",
                "Atemtechniken zur Akutbewältigung",
                "Einstellung auf SSRI-Medikation"
            ],
            meds: "Venlafaxin oder Escitalopram",
            dosage: "Dosierung wird individuell angepasst."
        }
    ];

    function build() {
        const container = document.getElementById('guide');
        data.forEach((item, i) => {
            container.innerHTML += `
                <div class="guide-card ${item.type}" data-key="${item.keywords} ${item.dept.toLowerCase()}">
                    <div class="card-header">
                        <span>${item.title}</span>
                        <span class="badge badge-dept">${item.dept}</span>
                    </div>
                    <div class="card-body">
                        <ul>${item.steps.map(s => `<li>${s}</li>`).join('')}</ul>
                        <div class="dosage-info">
                            <span class="badge badge-med">Medikation: ${item.meds}</span><br>
                            <small><strong>Hinweis:</strong> ${item.dosage}</small>
                        </div>
                    </div>
                </div>`;
        });
    }

    function search() {
        let input = document.getElementById('search').value.toLowerCase();
        let cards = document.getElementsByClassName('guide-card');
        Array.from(cards).forEach(c => {
            c.style.display = (input.length > 1 && c.dataset.key.includes(input)) ? "block" : "none";
        });
    }

    build();
</script>
</body>
</html>
