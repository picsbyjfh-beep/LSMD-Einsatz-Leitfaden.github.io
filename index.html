<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSMD | Global Medical Encyclopedia</title>
    <style>
        :root {
            --lsmd-red: #c0392b; --surgery-blue: #2980b9; --psych-purple: #8e44ad;
            --dark-bg: #0a0a0a; --card-bg: #161616; --text: #f0f0f0;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark-bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        /* Header & Navigation */
        .header { text-align: center; border-bottom: 2px solid var(--lsmd-red); padding-bottom: 20px; margin-bottom: 20px; }
        .search-container { position: sticky; top: 0; background: var(--dark-bg); padding: 15px 0; z-index: 100; border-bottom: 1px solid #333; }
        .search-box { width: 100%; padding: 15px; background: #222; border: 1px solid #444; border-radius: 8px; color: white; font-size: 18px; }
        
        .filter-group { display: flex; gap: 10px; margin-top: 15px; justify-content: center; flex-wrap: wrap; }
        .filter-btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; background: #333; color: #ccc; transition: 0.3s; }
        .filter-btn.active { background: var(--lsmd-red); color: white; }

        /* Card System */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card-bg); border-radius: 10px; border: 1px solid #222; display: flex; flex-direction: column; overflow: hidden; transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); border-color: #444; }
        
        .card-header { padding: 15px; font-weight: bold; font-size: 1.1em; border-bottom: 2px solid transparent; }
        .EMERGENCY .card-header { border-color: var(--lsmd-red); color: #ff7675; }
        .SURGERY .card-header { border-color: var(--surgery-blue); color: #74b9ff; }
        .PSYCH .card-header { border-color: var(--psych-purple); color: #a29bfe; }

        .card-content { padding: 15px; flex-grow: 1; font-size: 0.95em; }
        .label { color: #888; font-size: 0.8em; text-transform: uppercase; display: block; margin-top: 10px; border-bottom: 1px solid #333; }
        
        .rp-box { background: #000; color: #00b894; padding: 10px; border-radius: 4px; font-family: monospace; margin-top: 10px; border-left: 3px solid #00b894; }
        .med-tag { color: #fdcb6e; font-weight: bold; }
        
        ul { padding-left: 18px; margin: 5px 0; }
        li { margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>LSMD ENZYKLOPÄDIE</h1>
        <small>Zentrales Archiv für medizinische Verfahren & Psychotherapie</small>
    </div>

    <div class="search-container">
        <input type="text" id="search" class="search-box" placeholder="Suche (z.B. Schuss, Psychose, Beinbruch, ID: 102)..." onkeyup="render()">
        <div class="filter-group">
            <button class="filter-btn active" onclick="setFilter('ALL', this)">Alle</button>
            <button class="filter-btn" onclick="setFilter('EMERGENCY', this)">Notaufnahme</button>
            <button class="filter-btn" onclick="setFilter('SURGERY', this)">Chirurgie</button>
            <button class="filter-btn" onclick="setFilter('PSYCH', this)">Psychotherapie</button>
        </div>
    </div>

    <div id="grid" class="grid"></div>
</div>

<script>
    // DATENBANK - Hier kannst du JEDES Szenario hinzufügen
    const database = [
        // --- NOTAUFNAHME ---
        { id: 101, type: "EMERGENCY", title: "Schwerer Autounfall (Polytrauma)", tags: "unfall crash polytrauma trauma",
          steps: ["Vitals (Puls, Atmung, RR) prüfen", "HWS-Schiene (Stiffneck) anlegen", "Vakuummatratze für Stabilisierung", "Infusion (Ringer) legen"],
          meds: "Analgetika (nach Protokoll)", rp: "/me prüft Pupillenreaktion\n/do Patient ist ansprechbar, klagt über Rückenschmerz",
          note: "Bei Verdacht auf Wirbelsäulenverletzung: Spineboard nutzen!" },
        
        { id: 102, type: "EMERGENCY", title: "Offene Fraktur (Unterschenkel)", tags: "bruch bein knochen blutung",
          steps: ["Blutstillung (Druckverband)", "Wundsäuberung mit NaCl", "Ruhigstellung mit Luftkammer-Schiene", "Abdeckung mit sterilem Tuch"],
          meds: "Schmerzmittel (nach ärztlicher Anordnung)", rp: "/me fixiert die Beinschiene\n/me desinfiziert die Wundränder",
          note: "Gefahr eines Fettembolie-Syndroms bei großen Röhrenknochen." },

        // --- CHIRURGIE ---
        { id: 201, type: "SURGERY", title: "Milzruptur (Milz-OP)", tags: "milz innerlich blutung op",
          steps: ["Laparotomie (Bauchschnitt)", "Absaugen des Blutes (Zellsaver)", "Abklemmung der Milzarterie", "Splenektomie (Milzentfernung)"],
          meds: "Vollnarkose, Breitbandantibiotikum", rp: "/me führt den Skalpellschnitt durch\n/me setzt die Gefäßklemmen an",
          note: "Patient benötigt post-operativ Impfschutz, da Milz fehlt!" },

        { id: 202, type: "SURGERY", title: "Epiduralhämatom (Hirn-OP)", tags: "kopf hirn blutung schädel op",
          steps: ["Kraniotomie (Schädelöffnung)", "Entfernung des Blutgerinnsels", "Blutstillung der Arteria meningea", "Rückfixierung des Knochendeckels"],
          meds: "Antioödematöse Mittel", rp: "/me setzt den Bohrer an den Schädel an\n/me entlastet den Druck im Gehirn",
          note: "Extremer Zeitdruck – Pupillendifferenz beachten!" },

        // --- PSYCHOTHERAPIE ---
        { id: 301, type: "PSYCH", title: "Paranoide Schizophrenie (Akutschub)", tags: "psychose stimmen wahn angst",
          steps: ["Reizabschirmung (ruhiger Raum)", "Validation (Wahn nicht ausreden, aber nicht bestätigen)", "Suizid-Check", "Gefährdungsbeurteilung"],
          meds: "Sedierung (nach Protokoll)", rp: "/me hält respektvollen Abstand\n/me spricht ruhig und sachlich mit dem Patienten",
          note: "Niemals von hinten an den Patienten herantreten." },

        { id: 302, type: "PSYCH", title: "Narzisstische Persönlichkeitsstörung", tags: "ego narzissmus therapie",
          steps: ["Exploration des Selbstbildes", "Arbeit an Empathiefähigkeit", "Hinterfragen von Grandiositätsphantasien"],
          meds: "Keine Standardmedikation (nur bei Komorbidität)", rp: "/me spiegelt das Verhalten des Patienten\n/do Der Patient reagiert abwertend",
          note: "Therapeutische Distanz wahren (Gefahr der Manipulation)." }
    ];

    let filterType = 'ALL';

    function setFilter(type, btn) {
        filterType = type;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function render() {
        const query = document.getElementById('search').value.toLowerCase();
        const grid = document.getElementById('grid');
        grid.innerHTML = "";

        database.forEach(item => {
            const matchSearch = item.title.toLowerCase().includes(query) || item.tags.includes(query) || item.id.toString().includes(query);
            const matchFilter = filterType === 'ALL' || item.type === filterType;

            if (matchSearch && matchFilter) {
                grid.innerHTML += `
                    <div class="card ${item.type}">
                        <div class="card-header">§${item.id} | ${item.title}</div>
                        <div class="card-content">
                            <span class="label">Behandlungsplan</span>
                            <ul>${item.steps.map(s => `<li>${s}</li>`).join('')}</ul>
                            
                            <span class="label">Medikamentenklassen / Hinweis</span>
                            <span class="med-tag">${item.meds}</span>
                            
                            <span class="label">RP-Guide (/me /do)</span>
                            <div class="rp-box">${item.rp.replace(/\n/g, '<br>')}</div>
                            
                            <span class="label">Wichtige Warnung</span>
                            <small>⚠️ ${item.note}</small>
                        </div>
                    </div>`;
            }
        });
    }

    render(); // Initialer Start
</script>

</body>
</html>
