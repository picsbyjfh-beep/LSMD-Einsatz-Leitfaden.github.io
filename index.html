<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSMD | Global Medical Database</title>
    <style>
        :root {
            --lsmd-red: #c0392b; --surgery-blue: #2980b9; --psych-purple: #8e44ad;
            --dark-bg: #0a0a0a; --card-bg: #161616; --text: #f0f0f0;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        .header { text-align: center; border-bottom: 2px solid var(--lsmd-red); padding-bottom: 20px; margin-bottom: 20px; }
        .search-container { position: sticky; top: 0; background: var(--dark-bg); padding: 15px 0; z-index: 100; border-bottom: 1px solid #333; }
        .search-box { width: 100%; padding: 15px; background: #222; border: 1px solid #444; border-radius: 8px; color: white; font-size: 18px; outline: none; }
        .search-box:focus { border-color: var(--lsmd-red); }

        .filter-group { display: flex; gap: 10px; margin-top: 15px; justify-content: center; flex-wrap: wrap; }
        .filter-btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; background: #333; color: #ccc; transition: 0.3s; font-weight: bold; }
        .filter-btn.active { background: var(--lsmd-red); color: white; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card-bg); border-radius: 10px; border: 1px solid #222; display: flex; flex-direction: column; overflow: hidden; }
        
        .card-header { padding: 15px; font-weight: bold; font-size: 1.1em; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .EMERGENCY .card-header { border-color: var(--lsmd-red); color: #ff7675; background: #2a1010; }
        .SURGERY .card-header { border-color: var(--surgery-blue); color: #74b9ff; background: #101a2a; }
        .PSYCH .card-header { border-color: var(--psych-purple); color: #a29bfe; background: #1a102a; }

        .card-content { padding: 15px; flex-grow: 1; }
        .label { color: #888; font-size: 0.75em; text-transform: uppercase; display: block; margin-top: 12px; border-bottom: 1px solid #333; padding-bottom: 3px; margin-bottom: 5px; }
        
        .rp-box { background: #000; color: #00b894; padding: 12px; border-radius: 5px; font-family: 'Courier New', monospace; margin-top: 10px; border-left: 4px solid #00b894; font-size: 0.9em; line-height: 1.4; }
        .med-tag { color: #fdcb6e; font-weight: bold; font-size: 0.95em; }
        
        ul { padding-left: 18px; margin: 5px 0; }
        li { margin-bottom: 5px; font-size: 0.92em; }
        .warn { color: #ff7675; font-size: 0.85em; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>LSMD GLOBAL MEDICAL DATABASE</h1>
        <p>Zentrales Informationssystem für Notdienst, Chirurgie & Psychotherapie</p>
    </div>

    <div class="search-container">
        <input type="text" id="search" class="search-box" placeholder="Suche nach Szenario, ID, Körperteil oder Medikament..." onkeyup="render()">
        <div class="filter-group">
            <button class="filter-btn active" onclick="setFilter('ALL', this)">ALLE BEREICHE</button>
            <button class="filter-btn" onclick="setFilter('EMERGENCY', this)">NOTDIENST</button>
            <button class="filter-btn" onclick="setFilter('SURGERY', this)">CHIRURGIE (OP)</button>
            <button class="filter-btn" onclick="setFilter('PSYCH', this)">PSYCHOTHERAPIE</button>
        </div>
    </div>

    <div id="grid" class="grid"></div>
</div>

<script>
    const database = [
        // --- EMERGENCY (100+) ---

        { id: 104, type: "EMERGENCY", title: "Opioid-Überdosis", tags: "drogen junkie nadel hero atemstopp", steps: ["Beutelbeatmung einleiten", "Naloxon-Gabe (Nasal oder i.v.)", "Absaugen von Erbrochenem", "Fixierung am Bett"], meds: "Naloxon (0.4mg - 2.0mg)", rp: "/me spritzt das Naloxon in die Nase\n/do Der Patient schnappt plötzlich nach Luft", note: "Nach Erwachen droht extreme Aggressivität!" },
        { id: 105, type: "EMERGENCY", title: "Spannungspneumothorax", tags: "lunge messer stich atemnot brust kugel", steps: ["Wunde abdichten", "Entlastungspunktion (Monaldi-Punkt)", "Sauerstoffgabe", "Thoraxdrainage legen"], meds: "Morphin (Schmerz), Sauerstoff", rp: "/me sticht die Entlastungsnadel in den Thorax\n/do Man hört hörbar gestaute Luft entweichen", note: "Lebensgefahr durch Herz-Druck!" },
        { id: 106, type: "EMERGENCY", title: "Epileptischer Anfall", tags: "krampf zucken kopf fallen epilepsie", steps: ["Umgebung sichern (Verletzungsschutz)", "Nichts in den Mund stecken!", "Abklingen abwarten", "Benzodiazepine (Tavor)"], meds: "Diazepam (10mg) oder Lorazepam", rp: "/me schützt den Kopf des Patienten mit einer Decke\n/do Der Krampf lässt nach 3 Minuten nach", note: "Status Epilepticus (>5 Min) ist lebensgefährlich!" },
        { id: 107, type: "EMERGENCY", title: "Arterielle Blutung", tags: "blut schnitt säge unfall wunde", steps: ["Direkter Druck auf Wunde", "Druckverband anlegen", "Tourniquet (Abbinden) bei Extremitäten", "Schocklagerung (Beine hoch)"], meds: "Tranexamsäure (Gerinnungsbeschleuniger)", rp: "/me zieht das Tourniquet am Oberarm fest\n/do Die spritzende Blutung stoppt sofort", note: "Tourniquet-Zeit gut sichtbar notieren!" },
        { id: 108, type: "EMERGENCY", title: "Alkoholvergiftung", tags: "alkohol trinken bewusstlos gift party", steps: ["Stabile Seitenlage", "Blutzucker messen", "Infusion (Elektrolyte)", "Überwachung der Atmung"], meds: "Vitamin B1, Glucose (bei Bedarf)", rp: "/me dreht den Patienten in die Seitenlage\n/me führt den Blutzuckertest am Finger durch", note: "Erstickungsgefahr durch Erbrochenes!" },
        { id: 109, type: "EMERGENCY", title: "Verbrennung (Schwer)", tags: "feuer brennen explosion haut brand", steps: ["Brandquelle entfernen", "Keimfreie Abdeckung (Metalline)", "Flüssigkeitssubstitution (Parkland)", "Schmerztherapie (Ketamin)"], meds: "Esketamin, Morphin, Ringer", rp: "/me deckt die Brandwunde steril ab\n/me stellt die Infusion auf maximale Laufrate", note: "Kein Eiswasser nutzen! (Unterkühlungsgefahr)" },
        { id: 110, type: "EMERGENCY", title: "Kohlenmonoxid-Intox", tags: "gas rauch feuer garage abgase", steps: ["Rettung aus Gefahr (Eigenschutz!)", "100% Sauerstoff (High-Flow)", "EKG-Überwachung", "Druckkammerfahrt vorbereiten"], meds: "Sauerstoff (15 Liter/Min)", rp: "/me presst die Sauerstoffmaske auf das Gesicht\n/do Die Haut des Patienten wirkt kirschrot", note: "Sauerstoffsättigung im Display ist oft falsch!" },

        // --- SURGERY (200+) ---
        { id: 201, type: "SURGERY", title: "Projektilextraktion (Bauch)", tags: "schuss kugel op bauch chirurgie kugel", steps: ["Laparotomie (Eröffnung Bauchraum)", "Blutabsaugung", "Arterienklemmen setzen", "Extraktion mit Kornzange", "Darm-Check auf Lecks"], meds: "Propofol, Fentanyl, Rocuronium", rp: "/me setzt das Skalpell an und schneidet\n/me zieht das Projektil aus dem Gewebe", note: "Immer nach einer Austrittswunde suchen!" },
        { id: 202, type: "SURGERY", title: "Milz-Entfernung", tags: "milz innerlich blutung op bauch ruptur", steps: ["Bauchraum öffnen", "Arteria lienalis abklemmen", "Milz lösen und entnehmen", "Wundhöhle spülen", "Drainage einlegen"], meds: "Blutkonserven, Breitbandantibiotika", rp: "/me setzt die Gefäßklemmen an die Milzarterie\n/me entnimmt das rupturierte Organ", note: "Patient ist danach lebenslang infektionsgefährdet!" },
        { id: 203, type: "SURGERY", title: "Amputation (Extremität)", tags: "bein säge trauma unfall nekrose amputieren", steps: ["Hautlappenbildung", "Gefäßunterbindung (Ligatur)", "Knochensäge verwenden", "Nerven-Kürzung", "Muskel-Plastik (Stumpfverschluss)"], meds: "Morphium, Lokalanästhesie-Block", rp: "/me setzt die Knochensäge am Femur an\n/do Man hört das Reiben des Sägeblattes", note: "Nur durchführen, wenn keine Rettung möglich ist!" },
        { id: 204, type: "SURGERY", title: "Schädelöffnung (Hirnblutung)", tags: "kopf hirn blutung sturz schlag kraniotomie", steps: ["Hautschnitt (Bügelschnitt)", "Schädelbohrung (Trepanation)", "Hämatom absaugen", "Blutstillung (Elektrokoagulation)", "Knochendeckel fixieren"], meds: "Mannitol (Hirndrucksenkung)", rp: "/me bohrt vorsichtig den Schädelknochen auf\n/me entlastet den massiven Hirndruck", note: "Extrem zeitkritisch! Erblindungsgefahr." },
        { id: 205, type: "SURGERY", title: "Herzschrittmacher-OP", tags: "herz puls schwach schrittmacher op", steps: ["Schnitt unter Schlüsselbein", "Vene punktieren", "Sonden zum Herzen schieben", "Aggregat in Hauttasche einsetzen"], meds: "Lokalanästhesie, Sedierung", rp: "/me schiebt die Sonde unter Röntgenkontrolle vor\n/do Das EKG zeigt nun einen stabilen Rhythmus", note: "Keine MRT-Untersuchungen nach der OP!" },
        { id: 206, type: "SURGERY", title: "Organtransplantation (Leber)", tags: "leber organ ersatz chirurgie transplant", steps: ["Alte Leber explantieren", "Vena Cava verbinden", "Arterien anschließen", "Gallengang-Rekonstruktion"], meds: "Immunsuppressiva (Tacrolimus)", rp: "/me vernäht die Pfortader mit dem neuen Organ\n/do Die Leber füllt sich langsam mit Blut", note: "Abstoßungsgefahr ist extrem hoch!" },
        { id: 207, type: "SURGERY", title: "Offene Herz-OP (Bypass)", tags: "herz bypass brust säge chirurgie", steps: ["Sternotomie (Brustbein sägen)", "Herz-Lungen-Maschine anschließen", "Venen-Bypass aufnähen", "Herz wieder schlagen lassen"], meds: "Heparin, Kardioplegie-Lösung", rp: "/me sägt das Brustbein der Länge nach auf\n/me näht die Vene an die Koronararterie", note: "Herz muss während der Naht stillstehen!" },
        { id: 208, type: "SURGERY", title: "Hüft-Prothese (TEP)", tags: "hüfte knochen bruch gelenk op", steps: ["Hüftgelenk freilegen", "Hüftkopf absägen", "Pfanne ausfräsen", "Prothesenschaft einzementieren"], meds: "Vollnarkose, Heparin", rp: "/me fräst die Pfanne im Beckenknochen aus\n/me hämmert den Metallschaft in den Knochen", note: "Achtung vor Luxation (Auskugeln) nach OP!" },
        { id: 209, type: "SURGERY", title: "Lungenflügel-Entfernung", tags: "lunge krebs schuss op thorax", steps: ["Thorakotomie (Brustkorb öffnen)", "Lungenarterie klemmen", "Hauptbronchus vernähen", "Lungenflügel entnehmen"], meds: "Analgetika (hochdosiert)", rp: "/me verschließt den Bronchusstumpf mit Klammern\n/me hebt den geschädigten Lungenflügel heraus", note: "Patient muss Atemtherapie machen!" },
        { id: 210, type: "SURGERY", title: "Tracheotomie (Not-OP)", tags: "hals schnitt atmen luftröhre kris", steps: ["Hals überstrecken", "Schnitt zwischen Ringknorpel", "Spreizen der Luftröhre", "Kanüle einführen"], meds: "Lokalanästhesie, Desinfektion", rp: "/me setzt den waagerechten Schnitt am Hals\n/me schiebt das Kunststoffrohr in die Trachea", note: "Nur wenn Intubation über Mund unmöglich ist!" },

        // --- PSYCHOTHERAPIE (300+) ---
        { id: 301, type: "PSYCH", title: "Paranoide Schizophrenie", tags: "stimmen wahn psychose angst schizo", steps: ["Sicherheitsabstand halten", "Reizabschirmung (ruhig)", "Realitätsprüfung (sanft)", "Medikamentöse Einstellung"], meds: "Haloperidol (5mg), Olanzapin", rp: "/me spricht mit sanfter, ruhiger Stimme\n/me vermeidet hastige Bewegungen", note: "Wahn niemals ausreden, sondern Angst validieren!" },
        { id: 302, type: "PSYCH", title: "Akute Suizidalität", tags: "tod leben ende springen verzweiflung", steps: ["Beziehungsaufbau / Zuhören", "Krisenplan erstellen", "Non-Suizid-Pakt schließen", "Ggf. Zwangseinweisung (SGB)"], meds: "Lorazepam (Tavor) zur Beruhigung", rp: "/me hört aktiv zu und nickt empathisch\n/me bietet dem Patienten ein Glas Wasser an", note: "Patient darf keine Sekunde unbeaufsichtigt sein!" },
        { id: 303, type: "PSYCH", title: "Panikattacke (Akut)", tags: "angst atmen herz sterben panik", steps: ["Grounding-Technik (5-4-3-2-1)", "Anleitung zur Bauchatmung", "In Papiertüte atmen lassen", "Beruhigendes Gespräch"], meds: "Baldrian oder Tavor (bei Extremfall)", rp: "/me leitet den Patienten zum ruhigen Atmen an\n/me hält festen Blickkontakt", note: "Physische Ursachen (Herzinfarkt) vorher ausschließen!" },
        { id: 304, type: "PSYCH", title: "PTBS (Flashback)", tags: "trauma krieg gewalt erinnerung flashback", steps: ["Hier-und-Jetzt Orientierung", "Starke Reize (Ammoniak/Igelball)", "Distanzierung vom Erlebten", "Sicherheitsgefühl vermitteln"], meds: "Antidepressiva (Sertralin)", rp: "/me reicht dem Patienten ein Ammoniak-Stäbchen\n/me fragt nach dem heutigen Wochentag", note: "Keine Berührungen während eines Flashbacks!" },
        { id: 305, type: "PSYCH", title: "Bipolare Störung (Manie)", tags: "energie geld wahn party manisch", steps: ["Reizreduktion (Einzelzimmer)", "Finanzielle Vormundschaft klären", "Schlafhygiene erzwingen", "Stimmungsstabilisierer"], meds: "Lithium, Quetiapin", rp: "/me versucht den Redeschwall sanft zu bremsen\n/do Patient wirkt extrem getrieben und distanzlos", note: "Manische Patienten ignorieren körperliche Erschöpfung!" },

        { id: 308, type: "PSYCH", title: "Borderline (SVV)", tags: "schneiden ritz impuls emotionen", steps: ["Skill-Training (DBT)", "Notfallkoffer (Skill-Box)", "Validierung der Emotionen", "Spannungskurve analysieren"], meds: "Neuroleptika (bei Impulsspitzen)", rp: "/me bespricht die aktuelle Anspannung (1-100)\n/me zeigt Alternativen zum Ritzen (Gummi)", note: "Klare Absprachen bzgl. Selbstverletzung treffen." },
        { id: 309, type: "PSYCH", title: "Anorexie (Magersucht)", tags: "essen dünn gewicht hungern", steps: ["Esstagebuch führen", "Gewichts-Vertrag schließen", "Körperbild-Therapie", "Überwachung nach dem Essen"], meds: "Nahrungsergänzungsmittel", rp: "/me wiegt den Patienten mit dem Rücken zur Waage\n/me bespricht die Mahlzeit für heute", note: "Achtung: Patienten verstecken oft Gewichte!" },
        { id: 310, type: "PSYCH", title: "Dissoziative Identität", tags: "persönlichkeit spaltung trauma ego", steps: ["Sicherheit im System schaffen", "Kommunikation der Anteile", "Trauma-Bearbeitung (spät)", "Alltagsbewältigung"], meds: "Keine spezifischen Medikamente", rp: "/me fragt vorsichtig, wer gerade 'vorne' ist\n/me macht sich Notizen zum Stimmenwechsel", note: "Geduld ist hier der wichtigste Faktor!" }
    ];

    let filterType = 'ALL';

    function setFilter(type, btn) {
        filterType = type;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function render() {
        const query = document.getElementById('search').value.toLowerCase();
        const grid = document.getElementById('grid');
        grid.innerHTML = "";

        database.forEach(item => {
            const matchSearch = item.title.toLowerCase().includes(query) || item.tags.toLowerCase().includes(query) || item.id.toString().includes(query);
            const matchFilter = filterType === 'ALL' || item.type === filterType;

            if (matchSearch && matchFilter) {
                grid.innerHTML += `
                    <div class="card ${item.type}">
                        <div class="card-header">§${item.id} | ${item.title}</div>
                        <div class="card-content">
                            <span class="label">Behandlungsplan</span>
                            <ul>${item.steps.map(s => `<li>${s}</li>`).join('')}</ul>
                            
                            <span class="label">Medikation / Stoffklasse</span>
                            <span class="med-tag">${item.meds}</span>
                            
                            <span class="label">RP-Guide (/me /do)</span>
                            <div class="rp-box">${item.rp.replace(/\n/g, '<br>')}</div>
                            
                            <span class="label">Hinweis & Warnung</span>
                            <span class="warn">⚠️ ${item.note}</span>
                        </div>
                    </div>`;
            }
        });
    }

    // Initiales Rendern beim Laden der Seite
    render();
</script>

</body>
</html>
